<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-client-id" content="__GOOGLE_CLIENT_ID__">
    <meta name="google-api-key" content="__GOOGLE_API_KEY__">
    <title>Vault - Хранилище коллекции</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --glass-border: rgba(148, 163, 184, 0.1);
        }

        .light-theme {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .categories-list {
            flex: 1;
            overflow-y: auto;
        }

        .category-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-item:hover {
            background: var(--bg-tertiary);
        }

        .category-item.active {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .category-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .add-category-btn {
            padding: 12px;
            border: 2px dashed var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
            transition: all 0.2s;
        }

        .add-category-btn:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .settings-btn {
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-header {
            padding: 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-title {
            font-size: 24px;
            font-weight: 700;
        }

        .add-card-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .add-card-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .filter-chips {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .chip {
            padding: 6px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .chip.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .cards-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-cover-container {
            width: 100%;
            padding-top: 46.73%;
            position: relative;
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .card-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-cover-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            font-weight: 700;
        }

        .card-body {
            padding: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 12px;
        }

        .tag {
            padding: 2px 8px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 10px;
            font-size: 11px;
            color: var(--accent-purple);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--glass-border);
        }

        .card-rating {
            color: var(--accent-yellow);
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-cover {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 10px;
            background: var(--bg-primary);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Сайдбар -->
    <aside class="sidebar">
        <div class="logo">🔒 Vault</div>
        
        <input type="text" class="search-input" placeholder="Поиск..." id="globalSearch">
        
        <div class="categories-list" id="categoriesList"></div>
        
        <button class="add-category-btn" onclick="app.showAddCategoryModal()">
            ➕ Новая категория
        </button>
        
        <button class="settings-btn" onclick="app.openSettings()">
            ⚙️ Настройки
        </button>
    </aside>

    <!-- Основная область -->
    <main class="main-content">
        <header class="main-header">
            <h1 class="category-title" id="categoryTitle">Все карточки</h1>
            <button class="add-card-btn" onclick="app.showAddCardModal()">
                ➕ Добавить карточку
            </button>
        </header>

        <div class="filter-chips">
            <span class="chip active" onclick="app.filterCards('all')">Все</span>
            <span class="chip" onclick="app.filterCards('completed')">Пройдено</span>
            <span class="chip" onclick="app.filterCards('playing')">В процессе</span>
            <span class="chip" onclick="app.filterCards('plan-to-play')">Запланировано</span>
            <span class="chip" onclick="app.filterCards('dropped')">Заброшено</span>
        </div>

        <div class="cards-container" id="cardsContainer"></div>
    </main>

    <!-- Модальное окно карточки -->
    <div class="modal" id="cardModal">
        <div class="modal-content">
            <h2 id="modalTitle">Добавить карточку</h2>
            
            <div class="form-group">
                <label class="form-label">Название</label>
                <input type="text" class="form-input" id="editTitle" placeholder="Введите название...">
            </div>
            
            <div class="form-group">
                <label class="form-label">Обложка (URL)</label>
                <input type="text" class="form-input" id="editCoverUrl" placeholder="https://example.com/cover.jpg">
            </div>
            
            <div class="form-group">
                <label class="form-label">Описание</label>
                <textarea class="form-textarea" id="editDescription" placeholder="Описание..."></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">Основная ссылка</label>
                <input type="text" class="form-input" id="editPrimaryLink" placeholder="https://...">
            </div>
            
            <div class="form-group">
                <label class="form-label">Теги (через запятую)</label>
                <input type="text" class="form-input" id="editTags" placeholder="игры, RPG, 2024...">
            </div>
            
            <div class="form-group">
                <label class="form-label">Рейтинг (1-10)</label>
                <input type="number" class="form-input" id="editRating" min="1" max="10" value="5">
            </div>
            
            <div class="form-group">
                <label class="form-label">Статус</label>
                <select class="form-select" id="editStatus">
                    <option value="plan-to-play">Запланировано</option>
                    <option value="playing">В процессе</option>
                    <option value="completed">Пройдено</option>
                    <option value="dropped">Заброшено</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Заметки</label>
                <textarea class="form-textarea" id="editNotes" placeholder="Личные заметки..."></textarea>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeCardModal()">Отмена</button>
                <button class="btn btn-primary" onclick="app.saveCard()">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно категории -->
    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <h2>Новая категория</h2>
            
            <div class="form-group">
                <label class="form-label">Название</label>
                <input type="text" class="form-input" id="modalCategoryName" placeholder="Игры, Фильмы...">
            </div>
            
            <div class="form-group">
                <label class="form-label">Иконка</label>
                <input type="text" class="form-input" id="modalCategoryIcon" value="📁">
            </div>
            
            <div class="form-group">
                <label class="form-label">Цвет</label>
                <input type="color" class="form-input" id="modalCategoryColor" value="#8b5cf6" style="height: 40px;">
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeCategoryModal()">Отмена</button>
                <button class="btn btn-primary" onclick="app.saveCategory()">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Настройки</h2>
            
            <div class="form-group">
                <label class="form-label">Тема</label>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="app.setTheme('dark')">🌙 Темная</button>
                    <button class="btn btn-secondary" onclick="app.setTheme('light')">☀️ Светлая</button>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Google Диск</label>
                <button class="btn btn-primary" onclick="googleAuth.login()" style="width: 100%; margin-bottom: 8px;">
                    🔐 Войти через Google
                </button>
                <button class="btn btn-secondary" onclick="app.syncToCloud()" style="width: 100%; margin-bottom: 8px;">
                    🔄 Синхронизировать
                </button>
                <button class="btn btn-secondary" onclick="app.exportToComputer()" style="width: 100%; margin-bottom: 8px;">
                    📤 Экспорт JSON
                </button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="width: 100%;">
                    📥 Импорт JSON
                </button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="app.importFromComputer(event)">
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeSettings()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Google API -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <!-- Наше приложение -->
    <script src="google-auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
